# Intrusion CI gate — the fmt/clippy/test quality gate for issue #1.
#
# ACTIVATION: this file must live at `.github/workflows/ci.yml` to run. It is
# parked here because the credentials in the automated environment lack GitHub
# `workflow` scope and cannot push under `.github/workflows/`. Move it into place
# with a workflow-scoped token or via the GitHub web UI:
#
#     git mv ci/ci.yml .github/workflows/ci.yml   # then commit + push with workflow scope
#
# The contents below are final and ready to run as-is.
name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  gate:
    name: fmt / clippy / test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Build web crate for wasm
        run: cargo build -p intrusion-web --target wasm32-unknown-unknown
