<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Intrusion</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        /* The whole level fits the viewport (canvas sized in JS); never scroll. */
        overflow: hidden;
        background: #0b0b0b;
        color: #cfcfcf;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        /* Taps are game input (§11.6): no pan/pinch/double-tap-zoom gestures, no
           text selection or tap flash — the shell consumes pointerdown itself. */
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #app {
        display: grid;
        place-items: center;
        width: 100%;
        height: 100%;
      }
      canvas {
        /* Sized to fit the viewport by the shell; block so it doesn't add
           inline-baseline whitespace that could nudge the page into scrolling. */
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <!--
        The wasm module (built from crates/web via wasm-bindgen) mounts its
        canvas2d glyph grid (§11.1) here. The build step emits intrusion_web.js
        (the ES-module glue) and intrusion_web_bg.wasm alongside this file.
      -->
      <noscript>Intrusion needs JavaScript and WebAssembly.</noscript>
    </div>
    <script type="module">
      import init, { start } from "./intrusion_web.js";
      init().then(start);
    </script>
  </body>
</html>
